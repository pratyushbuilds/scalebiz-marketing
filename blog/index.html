  <!-- Google Tag Manager -->
  <!-- Google Tag Manager — deferred so it can't delay first paint.
       dataLayer is live immediately; gtm.js loads on window load (or the
       first tap/scroll/keypress, whichever happens first). -->
  <script>
    window.dataLayer = window.dataLayer || [];
    window.dataLayer.push({ 'gtm.start': new Date().getTime(), event: 'gtm.js' });
    (function () {
      var fired = false;
      function loadGTM() {
        if (fired) return; fired = true;
        var j = document.createElement('script');
        j.async = true;
        j.src = 'https://www.googletagmanager.com/gtm.js?id=GTM-NNRH63P5';
        document.head.appendChild(j);
      }
      if (document.readyState === 'complete') { setTimeout(loadGTM, 200); }
      else { window.addEventListener('load', function () { setTimeout(loadGTM, 200); }); }
      ['pointerdown', 'keydown', 'touchstart', 'scroll'].forEach(function (ev) {
        window.addEventListener(ev, loadGTM, { once: true, passive: true });
      });
    })();
  </script>
  <!-- End GTM -->

  <link rel="preconnect" href="https://www.googletagmanager.com">

  <!-- CRITICAL INLINE CSS (nav + blog index — plain, fast page, no animations) -->
  <style>
    .nav-header{position:sticky;top:0;z-index:999;backdrop-filter:blur(8px);background:rgba(250,249,246,.85);border-bottom:1px solid rgba(0,0,0,.05);height:70px}.navbar{max-width:1200px;margin:0 auto;padding:.8rem clamp(16px,5vw,48px);display:flex;align-items:center;justify-content:space-between}.nav-logo{font-weight:700;font-size:1.35rem;color:var(--text-heading);letter-spacing:.01em;text-decoration:none;transition:opacity .2s}.nav-logo:hover{opacity:.8}.nav-logo__accent{color:var(--primary-blue)}.nav-logo__dot{color:var(--accent-red)}.nav-menu{list-style:none;display:flex;align-items:center;gap:2.2rem;margin:0;padding:0}.nav-menu a{font-size:1.07rem;color:var(--text-primary);text-decoration:none;font-weight:500;transition:color .25s}.nav-menu a:hover{color:var(--primary-blue)}.nav-cta{background:linear-gradient(135deg,#0b4dff,#35a4ff);color:#fff!important;padding:.6rem 1.2rem;border-radius:8px;font-weight:600;transition:.3s}.nav-cta:hover{transform:translateY(-2px);box-shadow:0 6px 18px rgba(11,77,255,.25)}.nav-toggle{display:none;flex-direction:column;justify-content:space-between;width:28px;height:18px;background:0 0;border:none;cursor:pointer}.nav-toggle .bar{height:3px;width:100%;background:var(--text-primary);border-radius:2px;transition:.3s}@media (max-width:900px){.nav-toggle{display:flex;position:relative;z-index:1001}.nav-menu{position:fixed;top:0;right:0;height:100vh;width:72%;background:#fff;box-shadow:-4px 0 24px rgba(0,0,0,.08);flex-direction:column;align-items:flex-start;padding:6rem 2rem;gap:1.25rem;transform:translateX(100%);transition:transform .4s}.nav-menu.open{transform:translateX(0)}.nav-link{font-size:1.1rem;width:100%}.cta-link{display:inline-block;width:100%;text-align:center;margin-top:1.5rem}.nav-toggle.active .bar:first-child{transform:rotate(45deg) translateY(7px)}.nav-toggle.active .bar:nth-child(2){opacity:0}.nav-toggle.active .bar:nth-child(3){transform:rotate(-45deg) translateY(-7px)}}.nav-menu{transition:transform .3s,opacity .3s;will-change:transform}

    .blog-hero{background:var(--bg-main);padding:clamp(56px,8vw,88px) 0 clamp(24px,3vw,32px)}
    .blog-wrap{max-width:1100px;margin:0 auto;padding:0 clamp(16px,6vw,48px)}
    .blog-hero__title{font-family:"Playfair Display",Georgia,serif;font-weight:400;font-size:clamp(40px,6vw,64px);line-height:1.15;letter-spacing:.2px;color:var(--text-heading);margin:0 0 clamp(12px,1.8vw,18px)}
    .blog-hero__sub{color:#313131;font-size:1.15rem;line-height:1.6;max-width:60ch;margin:0}

    .blog-list{background:var(--bg-main);padding:clamp(8px,2vw,20px) 0 clamp(64px,8vw,96px)}
    .blog-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:clamp(1.5rem,3vw,2.25rem)}
    .blog-empty{border:1px dashed var(--chip-border);border-radius:16px;padding:clamp(2rem,5vw,3.5rem);text-align:center;color:var(--text-muted)}
    .blog-empty h2{font-family:Manrope,sans-serif;font-size:1.25rem;color:var(--text-heading);text-align:center;letter-spacing:0;margin:0 0 .5rem}
    .blog-empty p{font-size:1.05rem;margin:0 auto;max-width:44ch}

    /* Post-card component — ready to populate (see the commented example below) */
    .blog-card{display:flex;flex-direction:column;background:#fff;border:1px solid var(--rule);border-radius:16px;overflow:hidden;text-decoration:none;transition:border-color .25s,box-shadow .25s,transform .25s}
    .blog-card:hover{border-color:var(--primary-blue);box-shadow:0 8px 22px rgba(11,77,255,.08);transform:translateY(-2px)}
    .blog-card__media{aspect-ratio:16/9;background:var(--bg-elevated);object-fit:cover;width:100%}
    .blog-card__body{display:flex;flex-direction:column;gap:.5rem;padding:1.25rem 1.35rem 1.5rem}
    .blog-card__cat{font-family:Manrope,sans-serif;font-size:.75rem;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--primary-blue)}
    .blog-card__title{font-family:"Playfair Display",Georgia,serif;font-size:1.35rem;line-height:1.3;color:var(--text-heading);margin:0}
    .blog-card__excerpt{font-size:1rem;color:var(--text-muted);line-height:1.6;margin:0}
    .blog-card__meta{margin-top:.35rem;font-size:.85rem;color:var(--muted)}
  </style>

<body>
  <noscript><iframe src="https://www.googletagmanager.com/ns.html?id=GTM-NNRH63P5" height="0" width="0"

  <div id="page">

    <header class="nav-header" data-site-nav></header>
  <!-- no defer: renders the nav during parse so it's in the first paint -->
  <script src="../assets/js/common/navbar.js"></script>

    <section class="blog-hero">
      <div class="blog-wrap">
        <h1 class="blog-hero__title">Notes on performance marketing.</h1>
        <p class="blog-hero__sub">Practical breakdowns of what actually moves growth — offers, funnels,
          creative, and the numbers behind them. We're publishing soon.</p>
      </div>
    </section>

    <section class="blog-list">
      <div class="blog-wrap">
        <div class="blog-grid">

          <!-- Empty state (remove this block once the first post card is added). -->
          <div class="blog-empty">
            <h2>No posts yet</h2>
            <p>We're publishing soon. In the meantime, see how we work over on the
              <a href="../service.html#how-we-work">Services page</a>.</p>
          </div>

          <!--
          ============================================================
          POST CARD — copy this block for each published post.
          Duplicate <a class="blog-card"> once per post, newest first,
          and delete the .blog-empty block above once you have one.
          Update: href (the post page), image src/alt, category,
          title, excerpt, and the date.
          ============================================================
          <a class="blog-card" href="my-first-post.html">
            <img class="blog-card__media" src="../assets/images/blog/my-first-post.webp"
              alt="Short description of the image" loading="lazy" width="640" height="360" />
            <div class="blog-card__body">
              <span class="blog-card__cat">Paid Media</span>
              <h2 class="blog-card__title">The title of the post</h2>
              <p class="blog-card__excerpt">A one- or two-sentence summary that makes someone want to click.</p>
              <span class="blog-card__meta">13 Jul 2026 · 5 min read</span>
            </div>
          </a>
          -->

        </div>
      </div>
    </section>

    <!-- Shared split-CTA component (same one used across the site) -->

      data-from="blog"
      data-escape-href="../contact.html?src=cta_unsure&from=blog"

      data-form-title="Tell us what's blocking the growth"
      data-submit-label="Send It Over"
      data-escape-title="Not sure?"
      data-escape-line="Not knowing what's blocking your growth is exactly the problem we solve."
      data-escape-label="Let's Figure It Out">
      <noscript>
        <div class="audit-inner">
          <a href="../contact.html?src=cta_unsure&from=blog" class="audit-btn">Let's Figure It Out</a>
        </div>
      </noscript>
    </section>

    <footer class="ef-footer" role="contentinfo" aria-label="Site footer" data-site-footer data-page="blog"></footer>
  </div>

  <script defer src="../assets/js/common/form-backend.js"></script>
