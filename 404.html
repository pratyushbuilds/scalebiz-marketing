<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="robots" content="noindex" />
  <title>Page not found · Scalebiz Marketing</title>
  <link rel="icon" href="/favicon.ico" sizes="any" />
  <link rel="icon" type="image/svg+xml" href="/assets/favicon/favicon.svg" />
  <link rel="apple-touch-icon" sizes="180x180" href="/assets/favicon/apple-touch-icon.png" />
  <meta name="theme-color" content="#FAF9F6" />
  <style>
    :root { --navy: #151a25; --blue: #0B4DFF; --cream: #FAF9F6; --muted: #5b6475; }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh; padding: 2rem;
      background: var(--cream); color: var(--navy);
      font-family: Manrope, "Segoe UI", system-ui, -apple-system, sans-serif;
      text-align: center; line-height: 1.5;
    }
    .wrap { max-width: 30rem; }
    .code { font-size: clamp(3.5rem, 12vw, 6rem); font-weight: 700; letter-spacing: -0.02em; line-height: 1; }
    h1 { font-size: clamp(1.25rem, 4vw, 1.6rem); margin: 0.75rem 0 0.5rem; font-weight: 600; }
    p { color: var(--muted); font-size: 1.05rem; margin-bottom: 1.75rem; }
    a.home {
      display: inline-block; background: var(--blue); color: #fff;
      text-decoration: none; font-weight: 600; padding: 0.8rem 1.6rem;
      border-radius: 8px; transition: transform .2s, box-shadow .2s;
    }
    a.home:hover { transform: translateY(-2px); box-shadow: 0 6px 18px rgba(11, 77, 255, .25); }
  </style>
</head>

<body>
  <main class="wrap">
    <div class="code">404</div>
    <h1>Page not found</h1>
    <p>The page you're looking for doesn't exist or has moved.</p>
    <a class="home" href="/">Back to home</a>
  </main>
</body>

</html>
